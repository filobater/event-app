<div class="space-y-2">
  <label class="label" [for]="id()">
    <span class="label-text text-white">{{ labelText() }}</span>
  </label>
  <div
    class="input input-bordered rounded-lg w-full flex items-center gap-2 bg-(--dark-color) focus-within:input-info relative"
  >
    <svg
      class="h-4 w-4 shrink-0 opacity-50"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
      <path d="M7 11V7a5 5 0 0 1 10 0v4" />
    </svg>
    <input
      [id]="id()"
      [type]="showPassword() ? 'text' : 'password'"
      [placeholder]="placeholder()"
      [value]="value()"
      [disabled]="isDisabled()"
      (input)="handleInput($event)"
      (blur)="handleBlur()"
    />
    <!-- Show password icon -->
    @if (!showPassword()) {
      <svg
        (click)="handleShowingPassword()"
        class="h-4 w-4 shrink-0 opacity-50 absolute right-2 cursor-pointer"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
    } @else {
      <svg
        (click)="handleShowingPassword()"
        class="h-4 w-4 shrink-0 opacity-50 absolute right-2 cursor-pointer"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M3 3l18 18" />
        <path
          d="M17.94 17.94C16.12 19.24 14.15 20 12 20c-7 0-11-8-11-8a20.88 20.88 0 0 1 5.46-5.41"
        />
        <path d="M1 1l22 22" />
        <path d="M9.53 9.53a3.5 3.5 0 0 0 4.95 4.95" />
        <path d="M21 21A20.88 20.88 0 0 0 23 12s-4-7-11-7a9.61 9.61 0 0 0-4 .88" />
      </svg>
    }
  </div>
</div>
