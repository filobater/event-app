<div
  class="input input-bordered rounded-lg flex items-center gap-2 bg-(--dark-color) focus-within:input-info w-full"
>
  <i-lucide [img]="SearchIcon" class="h-4 w-4 shrink-0 opacity-50" />
  <input
    id="search"
    type="search"
    class="grow focus-within:input-info"
    [placeholder]="placeholder()"
    [value]="value()"
    (input)="handleSearch($event)"
  />
</div>
