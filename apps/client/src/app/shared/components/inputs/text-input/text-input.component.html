<div class="space-y-2">
  <label class="label" [attr.for]="type()">
    <span class="label-text text-white">{{ labelText() }}</span>
  </label>
  <input
    [id]="type()"
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="isDisabled()"
    (input)="handleInput($event)"
    (blur)="handleBlur()"
    class="input input-bordered rounded-lg w-full bg-(--dark-color) focus-within:input-info"
  />
</div>
