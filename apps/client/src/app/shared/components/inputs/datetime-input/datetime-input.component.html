<div class="space-y-2">
  <label class="label" for="event-date">
    <span class="text-white">{{ labelText() }}</span>
  </label>
  <input
    type="datetime-local"
    id="event-date"
    [min]="min()"
    [value]="value()"
    [disabled]="isDisabled()"
    (input)="handleInput($event)"
    (blur)="handleBlur()"
    class="input input-bordered rounded-lg w-full bg-(--dark-color) focus-within:input-info"
  />
</div>
