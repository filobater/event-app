<dialog #dialog class="modal" (close)="handleClose()" (click)="handleBackdropClick($event)">
  <div
    class="modal-box max-h-[90vh] overflow-y-auto w-11/12 max-w-3xl relative bg-(--dark-gray-color)"
    [class]="class()"
  >
    <button
      type="submit"
      class="btn btn-sm btn-circle btn-ghost absolute top-2 right-2"
      (click)="handleClose()"
    >
      ✕
    </button>

    <h3 class="text-lg font-bold pr-8">{{ title() }}</h3>
    <div class="py-4">
      <ng-content />
    </div>
  </div>
</dialog>
