<div
  (click)="router.navigate([nav.event(event()?._id ?? '')])"
  class="p-3 rounded-lg bg-[#2628364d] hover:bg-[#262836]/80 transition-all duration-300 border border-(--gray-color) cursor-pointer"
>
  <div class="flex items-center gap-3">
    <div class="avatar">
      <div class="w-18 rounded-xl">
        <img [src]="`${baseUrl}/${event()?.photo}`" [alt]="event()?.title" />
      </div>
    </div>
    <div class="flex flex-col gap-1">
      <span class="text-white text-sm font-medium truncate">{{ event()?.title | titlecase }}</span>
      <span class="text-(--light-gray-color) text-sm"
        >{{ event()?.dateTime | date: 'shortDate' }} -
        {{ registration()?.seatsCount ?? 0 }} seat(s)</span
      >
    </div>
  </div>
</div>
