<dialog
  #dialog
  class="modal z-1000 bg-transparent p-0 border-0 shadow-none outline-none"
  (close)="handleClose()"
>
  <div
    class="absolute inset-0 bg-(--dark-color)/85"
    aria-hidden="true"
    (click)="handleClose()"
  ></div>
  <div
    class="modal-box max-h-[90vh] overflow-y-auto w-11/12 max-w-md relative z-10 bg-(--dark-gray-color)"
    (click)="$event.stopPropagation()"
  >
    <button
      type="button"
      class="btn btn-sm btn-circle btn-ghost absolute top-2 right-2"
      (click)="handleClose()"
    >
      ✕
    </button>

    <h3 class="text-lg font-bold pr-8 text-white">{{ title() }}</h3>
    <p class="py-4 text-(--light-gray-color)">{{ description() }}</p>

    <div class="flex justify-end gap-2 pt-2">
      <button
        type="button"
        class="btn btn-ghost text-(--light-gray-color) hover:text-white disabled:opacity-50 disabled:cursor-not-allowed"
        (click)="handleCancel()"
        [disabled]="disabled()"
      >
        {{ cancelLabel() }}
      </button>
      <button
        type="button"
        class="btn bg-(--destructive-color) text-white hover:bg-(--destructive-color)/90 border-0 disabled:opacity-50 disabled:cursor-not-allowed"
        (click)="handleOk()"
        [disabled]="disabled()"
      >
        {{ okLabel() }}
      </button>
    </div>
  </div>
</dialog>
