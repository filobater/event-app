<div class="avatar" [class.avatar-placeholder]="!showImage">
  @if (showImage) {
    <div class="w-12 rounded-full" [class]="class()">
      <img [src]="baseUrl + '/' + imageUrl()" [alt]="label()" (error)="onError()" />
    </div>
  } @else {
    <div class="bg-neutral text-neutral-content w-12 rounded-full" [class]="class()">
      <span class="text-lg">
        {{ label() | slice: 0 : 1 | uppercase }}
      </span>
    </div>
  }
</div>
