<div
  class="card compact overflow-hidden rounded-xl border-l-4 bg-base-200"
  [class]="variant[event().status]"
>
  <app-thumbnail [event]="event()" />
  <div class="card-body gap-2 p-4">
    <h2 class="card-title text-lg font-bold text-base-content">{{ event().title }}</h2>
    <p class="text-sm text-base-content/70 line-clamp-2">{{ event().description }}</p>

    <div class="flex items-center gap-1">
      <app-info-label title="{{ event().date }}">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="var(--main-color)"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"
          />
        </svg>
      </app-info-label>
      <app-info-label title="{{ event().time }}">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="var(--secondary-color)"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
          />
        </svg>
      </app-info-label>
      <app-info-label title="{{ event().location }}">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="var(--accent-color)"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
          />
        </svg>
      </app-info-label>
    </div>
    <div class="flex items-center gap-2 justify-between">
      <app-info-label title="{{ event().registeredSeats }}/{{ event().totalSeats }} Seats">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z"
          />
        </svg>
      </app-info-label>
      <app-info-label
        title="{{ event().totalSeats === event().registeredSeats ? 'Full' : 'Available' }}"
        textColorClass="{{
          event().totalSeats === event().registeredSeats
            ? 'text-(--destructive-color)'
            : 'text-(--accent-color)'
        }}"
      >
        {{
          event().totalSeats === event().registeredSeats
            ? ''
            : event().totalSeats - event().registeredSeats
        }}
      </app-info-label>
    </div>
  </div>
  <app-progress [value]="event().registeredSeats" [max]="event().totalSeats" />
</div>
