@if (config()) {
  <app-alert-modal
    [title]="config()!.title"
    [description]="config()!.description"
    [cancelLabel]="config()!.cancelLabel"
    [okLabel]="config()!.okLabel"
    [okVariant]="okVariant()"
    [isOpen]="action() !== null"
    [disabled]="requestState.loading()"
    (cancelled)="cancelled.emit()"
    (ok)="ok.emit()"
  />
}
