<form [formGroup]="userForm" class="flex flex-col gap-6" (ngSubmit)="handleSubmit()">
  <div>
    <app-image-upload formControlName="profilePicture" label="Profile Picture"></app-image-upload>
  </div>

  <div class="space-y-2">
    <app-text-input
      formControlName="fullName"
      [id]="'user-fullName'"
      labelText="Full Name"
      placeholder="Enter full name"
    ></app-text-input>
    <app-error-message
      [message]="getValidationErrorMessage(formData.fullName, 'Full Name')"
    ></app-error-message>
  </div>

  <div class="space-y-2">
    <app-text-input
      formControlName="email"
      [id]="'user-email'"
      labelText="Email"
      placeholder="Enter email"
      type="email"
    ></app-text-input>
    <app-error-message
      [message]="getValidationErrorMessage(formData.email, 'Email')"
    ></app-error-message>
  </div>
  <div class="space-y-2">
    <app-password-input
      formControlName="password"
      [id]="'user-password'"
      labelText="Password"
      placeholder="Enter password"
    ></app-password-input>
    <app-error-message
      [message]="getValidationErrorMessage(formData.password, 'Password')"
    ></app-error-message>
  </div>
  <div class="space-y-2">
    <app-password-input
      [id]="'user-confirmPassword'"
      labelText="Confirm Password"
      type="password"
      placeholder="Confirm your password"
      formControlName="confirmPassword"
    />
    <app-error-message
      [message]="getValidationErrorMessage(formData.confirmPassword, 'Confirm password')"
    ></app-error-message>
    @if (formData.confirmPassword?.touched && userForm.hasError('passwordMismatch')) {
      <app-error-message [message]="'Passwords do not match'"></app-error-message>
    }
  </div>

  <app-select-input
    formControlName="role"
    [id]="'user-role'"
    [labelText]="'Role'"
    [placeholder]="'Select role'"
    [options]="roleOptions"
  ></app-select-input>
  @if (requestState()?.error()) {
    <app-error-message [message]="requestState()?.error()"></app-error-message>
  }

  <div class="flex justify-end gap-2">
    <app-secondary-button [label]="'Cancel'" (handleClick)="handleCancel()"></app-secondary-button>
    <app-primary-button
      type="submit"
      [disabled]="userForm.invalid || (requestState()?.loading() ?? false)"
      [label]="requestState()?.loading() ? 'Saving...' : 'Save User'"
    />
  </div>
</form>
