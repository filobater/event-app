@if (user(); as u) {
  <div class="space-y-6">
    <div class="flex items-center justify-center flex-wrap md:items-start md:justify-start gap-4">
      <app-avatar
        [imageUrl]="u.profilePicture"
        [label]="u.fullName"
        class="size-20! shrink-0 ring-2 ring-blue-400 rounded-full"
      />
      <div class="flex flex-col gap-1 min-w-0">
        <h2 class="text-xl font-bold text-white">{{ u.fullName }}</h2>
        <div class="flex items-center gap-2 text-white text-sm">
          <i-lucide [img]="MailIcon" class="size-4 shrink-0" />
          <span>{{ u.email }}</span>
        </div>
        <div class="flex items-center gap-3 flex-wrap mt-1">
          <app-badge
            [label]="u.role"
            [color]="
              u.role === 'admin'
                ? 'bg-(--secondary-color) text-white'
                : 'bg-(--main-color) text-white'
            "
          >
            <i-lucide [img]="ShieldIcon" class="size-3.5 shrink-0" />
          </app-badge>
          <span class="flex items-center gap-2 text-white text-sm">
            <i-lucide [img]="CalendarIcon" class="size-4 shrink-0" />
            Joined {{ u.createdAt | date: 'shortDate' }}
          </span>
        </div>
      </div>
    </div>

    <div class="flex flex-col gap-4">
      <div class="flex items-center gap-2">
        <i-lucide [img]="TicketIcon" class="size-4 text-(--secondary-color)" />
        <h3 class="text-base font-semibold text-white">
          Registrations
          @if (registrationsTotalCount() > 0) {
            <span class="text-(--light-gray-color) font-normal text-sm ml-1">
              ({{ registrationsTotalCount() }})
            </span>
          }
        </h3>
      </div>
      <app-registration-list
        [registrations]="registrationsPreview()"
        [isLoading]="registrationsResource.resource.isLoading()"
        [skeletonItems]="previewLimit"
        [height]="'auto'"
      />

      @if (extraRegistrationsCount() > 0) {
        <a
          [routerLink]="nav.admin.userRegistrations(u._id)"
          class="btn w-full p-3 rounded-xl bg-(--main-color)/10 border border-(--main-color)/20 text-(--main-color) text-sm font-medium hover:bg-(--main-color)/20 transition-colors"
        >
          +{{ extraRegistrationsCount() }} more events
        </a>
      }
    </div>
  </div>
}
