<form [formGroup]="eventForm" class="flex flex-col gap-6" (ngSubmit)="handleSubmit()">
  <div class="space-y-2">
    <app-image-upload formControlName="photo" label="Upload Event Image"></app-image-upload>
    <app-error-message
      [message]="getValidationErrorMessage(formData.photo, 'Photo of the event')"
    ></app-error-message>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="space-y-2">
      <app-text-input
        formControlName="title"
        [id]="'event-title'"
        labelText="Title"
        placeholder="Enter event title"
      ></app-text-input>
      <app-error-message
        [message]="getValidationErrorMessage(formData.title, 'Title')"
      ></app-error-message>
    </div>

    <div class="space-y-2">
      <app-select-input
        formControlName="category"
        [id]="'event-category'"
        [labelText]="'Category'"
        [placeholder]="'Select category'"
        [options]="categoryOptions"
      ></app-select-input>
      <app-error-message
        [message]="getValidationErrorMessage(formData.category, 'Category')"
      ></app-error-message>
    </div>
  </div>

  <div class="space-y-2">
    <app-textarea
      formControlName="description"
      [id]="'event-description'"
      labelText="Description"
      placeholder="Write a short description"
    ></app-textarea>
    <app-error-message
      [message]="getValidationErrorMessage(formData.description, 'Description')"
    ></app-error-message>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="space-y-2">
      <app-datetime-input
        formControlName="dateTime"
        labelText="Date and Time"
        placeholder="Select date and time"
      ></app-datetime-input>
      <app-error-message
        [message]="getValidationErrorMessage(formData.dateTime, 'Date and time')"
      ></app-error-message>
    </div>

    <div class="space-y-2">
      <app-number-input
        formControlName="totalSeats"
        labelText="Total Seats"
        placeholder="100"
        [min]="0"
      ></app-number-input>
      <app-error-message
        [message]="getValidationErrorMessage(formData.totalSeats, 'Total seats')"
      ></app-error-message>
    </div>
  </div>

  <div class="space-y-2">
    <app-number-input
      formControlName="price"
      labelText="Price (EGP)"
      placeholder="0"
      [min]="0"
    ></app-number-input>
    <app-error-message
      [message]="getValidationErrorMessage(formData.price, 'Price')"
    ></app-error-message>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="space-y-2">
      <app-text-input
        formControlName="location"
        [id]="'event-location'"
        labelText="Location"
        placeholder="Enter location"
      ></app-text-input>
      <app-error-message
        [message]="getValidationErrorMessage(formData.location, 'Location')"
      ></app-error-message>
    </div>

    <div class="space-y-2">
      <app-select-input
        formControlName="status"
        [id]="'event-status'"
        [labelText]="'Status'"
        [placeholder]="'Select status'"
        [options]="statusOptions"
      ></app-select-input>
      <app-error-message
        [message]="getValidationErrorMessage(formData.status, 'Status')"
      ></app-error-message>
    </div>
  </div>

  <div class="space-y-4">
    <div class="flex items-center justify-between gap-3">
      <div class="text-white">Event Speakers</div>
      @if (formData.speakers.length !== 2) {
        <app-primary-button
          [label]="'Add Speaker'"
          (handleClick)="handleAddSpeaker()"
          [disabled]="formData.speakers.invalid"
        ></app-primary-button>
      }
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      @for (speaker of formData.speakers.controls; track $index; let i = $index) {
        <div
          class="rounded-xl border border-white/10 bg-base-200/40 p-4 flex flex-col gap-4"
          [formGroup]="getSpeakerGroup(i)"
        >
          <div class="space-y-2">
            <app-text-input
              formControlName="name"
              [id]="'event-speaker-name-' + i"
              labelText="Name"
              placeholder="Enter speaker's name"
            ></app-text-input>
            <app-error-message
              [message]="getValidationErrorMessage(speaker.get('name'), `Speaker name`)"
            ></app-error-message>
          </div>
          <div class="space-y-2">
            <app-text-input
              formControlName="title"
              [id]="'event-speaker-title-' + i"
              labelText="Title"
              placeholder="Enter speaker's title"
            ></app-text-input>
            <app-error-message
              [message]="getValidationErrorMessage(speaker.get('title'), `Speaker title`)"
            ></app-error-message>
          </div>
          <div class="space-y-2">
            <app-image-upload
              formControlName="image"
              [h]="'h-80'"
              label="Upload Speaker's Image"
            ></app-image-upload>
            <app-error-message
              [message]="getValidationErrorMessage(speaker.get('image'), `Speaker image`)"
            ></app-error-message>
          </div>
          @if (formData.speakers.length > 1) {
            <button
              type="button"
              class="btn bg-(--destructive-color) rounded-xl text-white hover:bg-(--destructive-color)/90 border-0 w-full"
              (click)="handleRemoveSpeaker(i)"
            >
              Remove Speaker
            </button>
          }
        </div>
      }
    </div>
  </div>

  @if (requestState()?.error()) {
    <app-error-message [message]="requestState()?.error()"></app-error-message>
  }

  <div class="flex justify-end gap-2">
    <app-secondary-button [label]="'Cancel'" (handleClick)="handleCancel()"></app-secondary-button>
    <app-primary-button
      type="submit"
      [disabled]="requestState()?.loading() || eventForm.invalid"
      [label]="requestState()?.loading() ? 'Saving...' : isEdit() ? 'Save Event' : 'Create Event'"
    />
  </div>
</form>
