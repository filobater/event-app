<app-auth-card
  [title]="'Forgot Password'"
  [subtitle]="'We will send a reset link to your email'"
  iconBackgroundColor="bg-(--accent-color)"
>
  <svg
    authCardIcon
    xmlns="http://www.w3.org/2000/svg"
    width="24"
    height="24"
    viewBox="0 0 24 24"
    fill="none"
    stroke="#000000"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
    <polyline points="22,6 12,13 2,6"></polyline>
  </svg>
  <form
    [formGroup]="forgotPasswordForm"
    (ngSubmit)="handleForgotPassword()"
    class="flex flex-col gap-5 mb-4"
  >
    <div class="space-y-2">
      <app-text-input
        labelText="Email"
        type="email"
        placeholder="Enter your email"
        formControlName="email"
      />
      @if (email?.touched) {
        @if (email?.errors?.['required']) {
          <app-error-message [message]="'Email is required'"></app-error-message>
        }
        @if (email?.errors?.['email']) {
          <app-error-message [message]="'Invalid email address'"></app-error-message>
        }
      }
    </div>
    @if (requestState.error()) {
      <div class="flex justify-center">
        <app-error-message [message]="requestState.error()" />
      </div>
    } @else if(requestState.successMessage()) {
      <div class="flex justify-center">
        <p class="text-sm text-(--accent-color)">{{ requestState.successMessage() }}</p>
      </div>
    }

    <app-primary-button [label]="requestState.loading() ? 'Sending Reset Link...' : 'Send Reset Link'" type="submit" [disabled]="forgotPasswordForm.invalid || requestState.loading()" />
  </form>
  <a
    routerLink="/auth/signin"
    class="text-sm hover:text-(--main-color) text-(--light-gray-color) flex justify-center"
    >Back to Login</a
  >
</app-auth-card>
